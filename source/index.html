<!DOCTYPE html>
<html>

<head>
<title>My First CI/CD</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* background animation */
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* main content box */
.container {
  margin-top: 120px;
}

/* heading animation */
h1 {
  font-size: 45px;
  animation: slideDown 2s ease;
}

p {
  font-size: 20px;
  animation: fadeIn 3s ease;
}

/* floating shapes */
.circle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.3;
  animation: float 8s infinite ease-in-out;
}

.circle1 {
  width: 150px;
  height: 150px;
  background: white;
  left: 10%;
  top: 80%;
}

.circle2 {
  width: 200px;
  height: 200px;
  background: pink;
  right: 10%;
  top: 20%;
}

.circle3 {
  width: 120px;
  height: 120px;
  background: yellow;
  left: 50%;
  top: 10%;
}

/* animations */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-40px); }
  100% { transform: translateY(0px); }
}

@keyframes slideDown {
  from { transform: translateY(-50px); opacity:0; }
  to { transform: translateY(0); opacity:1; }
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

/* button style */
button {
  margin-top: 30px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #764ba2;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

</style>

</head>

<body>

<div class="container">

<h1>🎉 My First CI/CD Pipeline 🎉</h1>

<p>
I am happy to successfully build and deploy my first project  
using GitHub Actions and AWS EC2 🚀
</p>

<p>
Every push to Git automatically updates this website 🔄
</p>

<button onclick="showMessage()">Click me 😄</button>

<p id="msg"></p>

</div>

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<script>

function showMessage() {
 document.getElementById("msg").innerHTML =
 "✨ Continuous Integration + Continuous Deployment working successfully! ✨";
}

</script>

</body>

</html>
